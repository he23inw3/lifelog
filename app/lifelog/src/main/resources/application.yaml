# ============================================================
# LifeLog - Quarkus Application Configuration
# ============================================================
quarkus:
  application:
    name: lifelog
  banner:
    enabled: false
  native:
    additional-build-args:
      - "--allow-incomplete-classpath"
      - "--initialize-at-run-time=com.google.genai"
  # ── HTTP ─────────────────────────────────────────────────
  http:
    port: 5000
    cors:
      enabled: true
      origins: "${CORS_ORIGINS:*}"
      headers: "*"
      methods: "*"
  arc:
    unremovable-types: "jp.he23inw3.asset.batch.*"

  # ── OIDC (GCP IAM) ───────────────────────────────────────
  # /api/slack/events は SlackSignatureFilter で別途保護するため
  # ユーザー設定・セッションAPIのみOIDCを適用する
  oidc:
    enabled: true
    auth-server-url: "https://accounts.google.com"
    client-id: "${OIDC_CLIENT_ID:lifelog}"
    token:
      issuer: "https://accounts.google.com"
    devservices:
      enabled: false
  keycloak:
    devservices:
      enabled: false

  # ── OpenAPI / Swagger UI ──────────────────────────────────
  smallrye-openapi:
    info-title: "LifeLog API"
    info-version: "1.0.0"
    info-description: "ライフログシステム - AI対話型日報・日記ツール"
    info-contact-name: "he23inw3"
  swagger-ui:
    always-include: true
    path: /swagger-ui

  # ── Logging (JSON for Cloud Logging) ─────────────────────
  log:
    level: INFO
    category:
      "jp.he23inw3":
        level: DEBUG
      "io.smallrye.faulttolerance":
        level: DEBUG
      "io.quarkus.vertx.http.runtime.cors":
        level: DEBUG
    console:
      format: "%d{yyyy-MM-dd HH:mm:ss} %-5p traceId=%X{traceId} [%c{3.}] (%t) %s%e%n"
      json: false # dev時はテキスト。本番はlogging-json拡張が自動でJSONに切替

  # ── Container Image (Jib) ────────────────────────────────
  container-image:
    group: jp.he23inw3
    name: lifelog
    tag: "${quarkus.application.version:latest}"

  # ── OpenTelemetry（Trace ID 自動生成） ────────────────────────────────────────
  otel:
    enabled: true
    sdk:
      disabled: false
    traces:
      exporter: none # ローカルでは外部送信しない

  # ── Micrometer ─────────────────────────────────────────────────────────────────
  micrometer:
    export:
      stackdriver:
        project-id: ${GOOGLE_CLOUD_PROJECT:lifelog-dev}
        enabled: false

  # ── Fault Tolerance Configuration ─────────────────────────────────────────────
  fault-tolerance:
    # Google Calendar Gateway configuration
    "jp.he23inw3.asset.infrastructure.google.GoogleCalendarGatewayImpl":
      retry:
        max-retries: "${CALENDAR_RETRY_MAX_RETRIES:3}"
        delay: "${CALENDAR_RETRY_DELAY_MS:1000}"

    # Slack Gateway configuration
    "jp.he23inw3.asset.infrastructure.slack.SlackGatewayImpl":
      retry:
        max-retries: "${SLACK_RETRY_MAX_RETRIES:3}"
        delay: "${SLACK_RETRY_DELAY_MS:1000}"

    # Gemini Gateway configuration
    "jp.he23inw3.asset.infrastructure.vertexai.VertexAiGeminiGatewayImpl":
      retry:
        max-retries: "${GEMINI_RETRY_MAX_RETRIES:3}"
        delay: "${GEMINI_RETRY_DELAY_MS:1000}"

# ── LifeLog Custom Properties ───────────────────────────────────────────────
lifelog:
  app-node: "${APP_NODE:dev}"
  google:
    project-id: "${GOOGLE_CLOUD_PROJECT:lifelog-dev}"
    japanese-holiday-calendar-id: "ja.japanese#holiday@group.v.calendar.google.com"
    oauth-client-id: "${GOOGLE_OAUTH_CLIENT_ID:dummy-google-client-id}"
    oauth-client-secret: "${GOOGLE_OAUTH_CLIENT_SECRET:dummy-google-client-secret}"
    oauth-redirect-uri: "${GOOGLE_OAUTH_REDIRECT_URI:http://localhost:5000/api/v1/auth/google/callback}"
  gemini:
    location: "${GEMINI_LOCATION:asia-northeast1}"
    model: "${GEMINI_MODEL:gemini-2.5-flash-lite}"
  slack:
    signing-secret: "${SLACK_SIGNING_SECRET:dummy-signing-secret}"
    bot-token: "${SLACK_BOT_TOKEN:xoxb-dummy}"
  bigquery:
    dataset: "${BIGQUERY_DATASET:lifelog_dataset}"
  demo:
    enabled: "${DEMO_MODE:false}"
    user-email: "${DEMO_USER_EMAIL:demo@example.com}"
    slack-user-id: "${DEMO_SLACK_USER_ID:DEMO_USER}"
  crypto:
    key-value: "${CRYPTO_KEY:1234567890123456}"
  portal:
    base-url: "${PORTAL_BASE_URL:http://localhost:5174}"
  bootstrap:
    allowed-email: "${BOOTSTRAP_ALLOWED_EMAIL:demo@example.com}"

# ── Production Profile ────────────────────────────────────────────────────────
"%prod":
  quarkus:
    log:
      console:
        json: true
    swagger-ui:
      always-include: false

# ── Dev Profile ───────────────────────────────────────────────────────────────
"%dev":
  quarkus:
    http:
      port: 5000

    google:
      cloud:
        project-id: "lifelog-dev"
        service-account-encoded-key: ""
        firestore:
          host-override: "localhost:8080"
        bigquery:
          host-override: "http://localhost:9050"
  lifelog:
    demo:
      enabled: "${DEMO_MODE:true}"
    bigquery:
      dataset: "${BIGQUERY_DATASET:lifelog_dev}"

# ── Remind Batch Profile ──────────────────────────────────────────────────────
"%remind-batch":
  quarkus:
    http:
      host-enabled: false
    swagger-ui:
      always-include: false
    log:
      console:
        json: "${BATCH_JSON_LOGGING:true}"

# ── Reflection Batch Profile ──────────────────────────────────────────────────
"%reflection-batch":
  quarkus:
    http:
      host-enabled: false
    swagger-ui:
      always-include: false
    log:
      console:
        json: "${BATCH_JSON_LOGGING:true}"
