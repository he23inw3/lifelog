steps:
  # Step 0: Ensure gradlew has execution permission and make the workspace directory writable for the builder container
  - name: "alpine"
    entrypoint: "sh"
    args:
      - "-c"
      - |
        chmod +x gradlew
        chmod -R 777 .
    dir: "app/lifelog"

  # Step 1: Build the Quarkus Native application and push the container image directly to Artifact Registry (using Jib)
  - name: "quay.io/quarkus/ubi-quarkus-mandrel-builder-image:jdk-25"
    entrypoint: "./gradlew"
    args:
      - "quarkusBuild"
      - "-Dquarkus.native.enabled=true" # Triggers the GraalVM/Mandrel Native compilation
      - "-Dquarkus.package.jar.enabled=false" # Prevent building JAR simultaneously (not supported when native is enabled)
      - "-Dquarkus.native.native-image-xmx=5g" # Limit Native Image compiler heap to 5g to fit inside 8gb RAM limit
      - "-Dquarkus.container-image.build=true"
      - "-Dquarkus.container-image.push=true"
      - "-Dquarkus.container-image.registry=${_REGION}-docker.pkg.dev"
      - "-Dquarkus.container-image.group=${PROJECT_ID}/${_REPO_NAME}"
      - "-Dquarkus.container-image.name=${_IMAGE_NAME}"
      - "-Dquarkus.container-image.tag=${_TAG}"
    dir: "app/lifelog"

  # Step 2: Deploy the Web API service revision to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk:latest"
    entrypoint: "gcloud"
    args:
      - "run"
      - "deploy"
      - "${_APP_NAME}-webapi"
      - "--image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/${_IMAGE_NAME}:${_TAG}"
      - "--region=${_REGION}"

  # Step 3: Deploy the Demo service revision to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk:latest"
    entrypoint: "gcloud"
    args:
      - "run"
      - "deploy"
      - "${_APP_NAME}-demo-webapi"
      - "--image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/${_IMAGE_NAME}:${_TAG}"
      - "--region=${_REGION}"

  # Step 4: Update the Remind Batch Job with the new image
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk:latest"
    entrypoint: "gcloud"
    args:
      - "run"
      - "jobs"
      - "update"
      - "${_APP_NAME}-remind-batch"
      - "--image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/${_IMAGE_NAME}:${_TAG}"
      - "--region=${_REGION}"

  # Step 5: Update the Reflection Batch Job with the new image
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk:latest"
    entrypoint: "gcloud"
    args:
      - "run"
      - "jobs"
      - "update"
      - "${_APP_NAME}-reflection-batch"
      - "--image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/${_IMAGE_NAME}:${_TAG}"
      - "--region=${_REGION}"

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8 # Native Image compilation requires significant CPU and memory resources

substitutions:
  _REGION: "asia-northeast1"
  _REPO_NAME: "lifelog-repo"
  _IMAGE_NAME: "lifelog"
  _APP_NAME: "lifelog"
  _TAG: "latest"
