name: 'Backend CI Component'
description: 'Install JDK, grant execute permission for gradlew, and run backend tests (Java/Gradle)'
inputs:
  working-directory:
    description: 'Working directory'
    required: true

runs:
  using: "composite"
  steps:
    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Grant execute permission for gradlew
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: chmod +x gradlew

    - name: Run JUnit Tests and Verify Coverage
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: ./gradlew test jacocoTestReport jacocoTestCoverageVerification
